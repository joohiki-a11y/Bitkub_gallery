<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bitkub Media Production — Production Gallery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Mitr:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f4f4f4; }
  ::selection { background: #02D767; color: #ffffff; }
  @keyframes merFade  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes merRise  { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes merShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes merPop   { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  /* Hide native scrollbar on the sticky tab strip (matches prototype scrollbar-width:none) */
  .mer-noscroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<!-- No build step: React 18 + htm (JSX-like tagged templates) from CDN. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js" crossorigin></script>

<script>
(function () {
  "use strict";
  const { useState, useEffect, useRef, Fragment } = React;
  const html = htm.bind(React.createElement);

  /* ============================================================================
   *  CONFIGURATION
   *  ---------------------------------------------------------------------------
   *  This gallery is driven ENTIRELY by the Google Sheet named in SHEET_ID
   *  below (no sample/placeholder data). If the sheet can't be read, the page
   *  shows an explicit on-page message instead of any fallback content.
   *
   *  Sheet setup (from the design chats):
   *    - Share the sheet: "Anyone with the link" → Viewer.
   *    - Two tabs joined by album_id:
   *
   *      Tab "Albums": album_id | category | title | title_en | client | year | cover | desc | photos | videos
   *      Tab "Media" : album_id | order | type | mtype | label | src | yt_id   (optional)
   *
   *        category = ANY text you choose (e.g. Photo, Video, Podcast, รายการ
   *          YouTube). Each distinct value becomes its own filter tab, labelled
   *          exactly as typed, in first-appearance (sheet-row) order. Matching
   *          is case-insensitive. Add a category in the sheet → a tab appears;
   *          no code change needed. (Blank ⇒ inferred: any video inside ⇒
   *          Video, else Photo.)
   *
   *      TWO WAYS to give a work its media — use either or both:
   *        A) Inline in the Albums row (simplest — no Media tab needed):
   *           `photos`   = one or more direct image URLs, comma/newline separated.
   *           `videos`   = one or more YouTube links/ids, comma/newline separated.
   *           `playlist` = one or more YouTube playlist links/ids — every video in
   *                        the playlist is pulled in (needs YT_API_KEY; playlist
   *                        must be Public or Unlisted).
   *           `spread`   = yes/true ⇒ each item (e.g. every playlist clip) shows
   *                        as its OWN card in the category and plays on click,
   *                        instead of being grouped into one album. Blank = grouped.
   *           → A photos-only album = one Albums row with the `photos` cell filled.
   *        B) One row per item in the Media tab (fine control: label, order, mtype):
   *           type ∈ { photo, video }; mtype ∈ { photo, video, youtube, short, highlight };
   *           photo rows use `src` (direct image URL), video rows use `yt_id`.
   *           A video work may also include photo rows (behind-the-scenes).
   * ========================================================================== */
  const CONFIG = {
    SHEET_ID: "1DPKYHhQEapdPYMoSotsTwTZetpbx2SGn5AtJkH_7S3I",  // live Google Sheet
    ALBUMS_SHEET: "Albums",  // tab name for the albums sheet
    MEDIA_SHEET: "Media",    // tab name for the media sheet
    // YouTube Data API v3 key — only needed for the `playlist` column (expanding
    // a playlist into individual video cards). Restrict it by HTTP referrer.
    YT_API_KEY: "AIzaSyCZcWsZvfs5EApHYf2Vsu-mW4vGc8wVjGI",
  };

  const GREEN = "#02D767";

  const ytThumb = (yt, res) => `https://i.ytimg.com/vi/${yt}/${res || "hqdefault"}.jpg`;

  // Cover <img> resilience for YouTube thumbnails:
  //  • maxresdefault often 404s → step down to hqdefault (onError).
  //  • a video with NO thumbnail returns a 120×90 grey "unavailable" placeholder
  //    with HTTP 200 (so onError never fires) → detect it by natural size and,
  //    when there's nothing better, drop the image so a clean neutral panel
  //    shows instead of YouTube's grey box.
  function coverGiveUp(t) {
    t.style.display = "none";
    const p = t.parentElement;
    if (p) { p.style.background = "#e6e6e6"; p.style.animation = "none"; }
  }
  function coverStepDown(e) {
    const t = e.currentTarget;
    if (t.src.indexOf("maxresdefault") !== -1) t.src = t.src.replace("maxresdefault", "hqdefault");
    else coverGiveUp(t);
  }
  function coverOnLoad(e) {
    const t = e.currentTarget;
    if (t.naturalWidth && t.naturalWidth <= 120) {
      if (t.src.indexOf("maxresdefault") !== -1) t.src = t.src.replace("maxresdefault", "hqdefault");
      else coverGiveUp(t);
    }
  }

  // Extract a YouTube id from a full URL (watch?v=, youtu.be/, /shorts/, …),
  // or return the input unchanged if it's already a bare id.
  function ytId(s) {
    s = (s || "").trim();
    const m = s.match(/(?:v=|youtu\.be\/|\/shorts\/|\/embed\/|\/live\/)([A-Za-z0-9_-]{6,})/);
    return m ? m[1] : s;
  }

  // Split a comma/newline-separated cell into a trimmed, non-empty list.
  function splitList(s) {
    return (s || "").split(/[\n,]+/).map((x) => x.trim()).filter(Boolean);
  }

  // Interpret a spreadsheet "yes"-ish cell as a boolean.
  function truthy(s) {
    return /^(yes|true|1|y|on|ใช่|✓)$/i.test((s || "").trim());
  }

  // Extract a playlist id from a URL (?list=…) or return a bare id as-is.
  function playlistId(s) {
    s = (s || "").trim();
    const m = s.match(/[?&]list=([A-Za-z0-9_-]+)/);
    return m ? m[1] : s;
  }

  // Fetch every video in a YouTube playlist via the Data API v3 (paginated).
  // Skips deleted/private entries. Returns [{ yt, label }]. CORS-enabled, so a
  // plain fetch works from the browser.
  async function fetchPlaylistItems(pid, apiKey) {
    const out = [];
    let pageToken = "";
    for (let guard = 0; guard < 20; guard++) { // safety cap ~1000 videos
      const url = "https://www.googleapis.com/youtube/v3/playlistItems" +
        `?part=snippet&maxResults=50&playlistId=${encodeURIComponent(pid)}` +
        `&key=${encodeURIComponent(apiKey)}${pageToken ? `&pageToken=${pageToken}` : ""}`;
      const res = await fetch(url);
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const j = await res.json(); if (j.error && j.error.message) msg = j.error.message; } catch (e) {}
        throw new Error(msg);
      }
      const data = await res.json();
      for (const it of (data.items || [])) {
        const sn = it.snippet || {};
        const vid = sn.resourceId && sn.resourceId.videoId;
        const title = sn.title || "";
        if (!vid || title === "Deleted video" || title === "Private video") continue;
        out.push({ yt: vid, label: title });
      }
      pageToken = data.nextPageToken || "";
      if (!pageToken) break;
    }
    return out;
  }

  /* ============================================================================
   *  GOOGLE SHEET LOADER
   * ========================================================================== */

  // Minimal RFC-4180-ish CSV parser (handles quoted fields, escaped quotes,
  // embedded commas and newlines).
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field); field = "";
      } else if (c === "\n") {
        row.push(field); rows.push(row); row = []; field = "";
      } else if (c === "\r") {
        // ignore; \n handles the row break
      } else field += c;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function rowsToObjects(rows) {
    if (!rows.length) return [];
    // Lowercase header keys so column names are matched case-insensitively
    // (e.g. "Album_id", "Order" still resolve to album_id / order).
    const headers = rows[0].map((h) => h.trim().toLowerCase());
    return rows.slice(1)
      .filter((r) => r.some((c) => c && c.trim() !== ""))
      .map((r) => {
        const o = {};
        headers.forEach((h, i) => { o[h] = (r[i] || "").trim(); });
        return o;
      });
  }

  // Read a sheet tab via the gviz JSON endpoint using JSONP (a <script> tag).
  // A plain fetch() to Google Sheets is blocked cross-origin (CORS), but a
  // <script> load is not subject to same-origin policy, so this works from any
  // host. `headers=1` forces the first row to be treated as column headers.
  let _jsonpSeq = 0;
  function fetchSheet(id, sheetName) {
    return new Promise((resolve, reject) => {
      const cb = "__gvizCb_" + (++_jsonpSeq);
      const url = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(id)}/gviz/tq` +
        `?tqx=out:json;responseHandler:${cb}&headers=1&sheet=${encodeURIComponent(sheetName)}`;
      const script = document.createElement("script");
      let settled = false;
      const cleanup = () => { delete window[cb]; script.remove(); clearTimeout(timer); };
      const timer = setTimeout(() => {
        if (settled) return; settled = true; cleanup();
        reject(new Error(`หมดเวลาเชื่อมต่อ Google Sheet (timeout) — แท็บ "${sheetName}" (ตรวจการแชร์สิทธิ์/ชื่อแท็บ)`));
      }, 15000);
      window[cb] = (resp) => {
        if (settled) return; settled = true; cleanup();
        try {
          if (resp && resp.status === "error") {
            const e = resp.errors && resp.errors[0];
            reject(new Error(((e && (e.detailed_message || e.message)) || "อ่านชีตไม่ได้") + ` — แท็บ "${sheetName}"`));
          } else if (!resp || !resp.table) {
            reject(new Error(`รูปแบบข้อมูลไม่ถูกต้องจากแท็บ "${sheetName}"`));
          } else {
            resolve(gvizToObjects(resp.table));
          }
        } catch (err) { reject(err); }
      };
      script.onerror = () => {
        if (settled) return; settled = true; cleanup();
        reject(new Error(`โหลดข้อมูลจาก Google ไม่ได้ — ตรวจการแชร์สิทธิ์และชื่อแท็บ "${sheetName}"`));
      };
      script.src = url;
      document.head.appendChild(script);
    });
  }

  // Convert a gviz table ({cols:[{label}], rows:[{c:[{v}]}]}) into row objects
  // keyed by lowercased header label (case-insensitive column matching).
  function gvizToObjects(table) {
    const headers = (table.cols || []).map((c, i) =>
      (c && c.label && c.label.trim()) ? c.label.trim().toLowerCase() : ("col" + i));
    return (table.rows || []).map((r) => {
      const o = {};
      (r.c || []).forEach((cell, i) => {
        const h = headers[i]; if (!h) return;
        const v = cell && cell.v != null ? cell.v : "";
        o[h] = typeof v === "string" ? v.trim() : String(v);
      });
      return o;
    }).filter((row) => Object.keys(row).some((k) => row[k] !== ""));
  }

  // Join Albums + Media rows into the album shape the UI renders.
  function buildAlbums(albumRows, mediaRows) {
    const byAlbum = {};
    for (const m of mediaRows) {
      const key = m.album_id;
      if (!key) continue;
      (byAlbum[key] || (byAlbum[key] = [])).push(m);
    }
    return albumRows
      .filter((a) => a.album_id)
      .map((a) => {
        const catRaw = (a.category || "").toLowerCase().trim();
        // 1) Media-tab rows (fine-grained control: per-item label, order, mtype).
        const sheetMedia = (byAlbum[a.album_id] || [])
          .slice()
          .sort((x, y) => (parseFloat(x.order) || 0) - (parseFloat(y.order) || 0))
          .map((m) => {
            const isVideo = (m.type || "").toLowerCase() === "video";
            return {
              type: isVideo ? "video" : "photo",
              mtype: (m.mtype || m.type || "photo").toLowerCase(),
              label: m.label || "",
              yt: ytId(m.yt_id || ""),
              src: m.src || "",
              full: m.src || "",
            };
          });
        // 2) Inline photos straight from the Albums row — a photos-only album
        //    needs NO Media rows: just paste image URLs into the `photos` cell.
        const inlinePhotos = splitList(a.photos).map((url) => ({
          type: "photo", mtype: "photo", label: "", yt: "", src: url, full: url,
        }));
        // 3) Inline videos from the Albums row (YouTube links or ids).
        const inlineVideos = splitList(a.videos).map((v) => ({
          type: "video", mtype: catRaw || "video", label: "", yt: ytId(v), src: "", full: "",
        }));
        const media = [...sheetMedia, ...inlinePhotos, ...inlineVideos];
        // 4) Playlist ids to expand into video cards later (async, via the API).
        const playlists = splitList(a.playlist).map(playlistId).filter(Boolean);

        // Cover: explicit column, else derive from the first media item.
        let cover = a.cover || "";
        if (!cover && media.length) {
          const first = media[0];
          cover = first.type === "video" ? ytThumb(first.yt, "maxresdefault") : first.src;
        }
        // Category: explicit column wins (kept as-typed for the tab label); else
        // infer (any video / playlist ⇒ Video, else Photo).
        const category = (a.category || "").trim() ||
          (media.some((m) => m.type === "video") || playlists.length ? "Video" : "Photo");
        return {
          id: a.album_id,
          category,
          title: a.title || "",
          titleEn: a.title_en || "",
          client: a.client || a.bu_owner || a["bu owner"] || "",
          year: a.year || "",
          cover,
          desc: a.desc || "",
          media,
          playlists,
          spread: truthy(a.spread), // if true, each media item becomes its own card
        };
      })
      // Keep works that already have media OR a playlist still to be expanded.
      .filter((a) => a.media.length > 0 || a.playlists.length > 0);
  }

  // Expand each album's `playlists` into individual video cards via the YouTube
  // Data API. Each distinct playlist is fetched once. A failed playlist is
  // logged, not thrown — one bad playlist must not sink the whole gallery.
  async function expandPlaylists(albums) {
    const errors = [];
    const ids = [...new Set(albums.flatMap((a) => a.playlists || []))];
    if (!ids.length) return errors;
    if (!CONFIG.YT_API_KEY) {
      errors.push('มีคอลัมน์ playlist แต่ยังไม่ได้ตั้งค่า YT_API_KEY ในไฟล์');
      return errors;
    }
    const byId = {};
    await Promise.all(ids.map(async (pid) => {
      try { byId[pid] = await fetchPlaylistItems(pid, CONFIG.YT_API_KEY); }
      catch (e) {
        console.error("[gallery] playlist fetch failed:", pid, e);
        byId[pid] = null;
        errors.push(`เพลย์ลิสต์ ${pid}: ${e && e.message ? e.message : String(e)}`);
      }
    }));
    for (const a of albums) {
      for (const pid of (a.playlists || [])) {
        const items = byId[pid];
        if (!Array.isArray(items)) continue;
        const mtype = a.category.toLowerCase() || "video";
        for (const it of items) {
          a.media.push({ type: "video", mtype, label: it.label || "", yt: it.yt, src: "", full: "" });
        }
      }
      if (!a.cover && a.media.length) {
        const f = a.media[0];
        a.cover = f.type === "video" ? ytThumb(f.yt, "maxresdefault") : f.src;
      }
    }
    return errors;
  }

  // Works flagged `spread` are exploded into one standalone card per media item
  // (each carries the work's category/BU owner/year), so e.g. every clip of a
  // playlist shows directly in the category and plays on click — no album step.
  function flattenSpread(albums) {
    const out = [];
    for (const a of albums) {
      if (a.spread && a.media.length) {
        a.media.forEach((m, i) => {
          out.push({
            id: a.id + "#" + i,
            category: a.category,
            title: m.label || a.title,
            titleEn: a.titleEn,
            client: a.client,
            year: a.year,
            cover: m.type === "video" ? ytThumb(m.yt, "maxresdefault") : (m.src || m.full || ""),
            desc: a.desc,
            media: [m],
            playlists: [],
            spread: false,
          });
        });
      } else {
        out.push(a);
      }
    }
    return out;
  }

  // Data comes ONLY from the Google Sheet — no sample fallback. Status drives
  // an explicit on-page message (loading / error / empty) so failures are
  // visible without opening DevTools.
  function useGalleryData() {
    const [state, setState] = useState({
      data: [],
      status: CONFIG.SHEET_ID ? "loading" : "config",
      error: "",
      warn: "",  // non-fatal notice (e.g. a playlist that failed to load)
    });
    useEffect(() => {
      if (!CONFIG.SHEET_ID) return;
      let alive = true;
      (async () => {
        try {
          const [albumRows, mediaRows] = await Promise.all([
            fetchSheet(CONFIG.SHEET_ID, CONFIG.ALBUMS_SHEET),
            fetchSheet(CONFIG.SHEET_ID, CONFIG.MEDIA_SHEET),
          ]);
          const albums = buildAlbums(albumRows, mediaRows);
          const plErrors = await expandPlaylists(albums); // pull playlist videos in as cards
          if (!alive) return;
          const withMedia = flattenSpread(albums).filter((a) => a.media.length > 0);
          if (withMedia.length) {
            setState({ data: withMedia, status: "ready", error: "", warn: plErrors.join(" · ") });
            return;
          }
          if (plErrors.length) {
            setState({ data: [], status: "error", warn: "",
              error: "ดึงเพลย์ลิสต์ไม่สำเร็จ — " + plErrors.join(" · ") });
            return;
          }
          // Read succeeded but produced 0 albums — report exactly what came back
          // so the cause is visible on-page (no DevTools needed).
          const aKeys = albumRows[0] ? Object.keys(albumRows[0]).join(", ") : "(ไม่มีแถว)";
          const mKeys = mediaRows[0] ? Object.keys(mediaRows[0]).join(", ") : "(ไม่มีแถว)";
          const nMatched = mediaRows.filter((m) => m.album_id && albumRows.some((a) => a.album_id === m.album_id)).length;
          setState({ data: [], status: "empty", error:
            `อ่านชีตแล้ว — Albums ${albumRows.length} แถว, Media ${mediaRows.length} แถว, media ที่จับคู่ album_id ได้ ${nMatched} แถว. ` +
            `คอลัมน์ Albums: [${aKeys}] · คอลัมน์ Media: [${mKeys}]. ` +
            `แต่ละงานต้องมีสื่ออย่างน้อย 1 ชิ้น — ใส่ลิงก์รูปในคอลัมน์ "photos" ของแท็บ Albums (อัลบั้มรูปล้วนทำได้ในแถวเดียว), ใส่ลิงก์ YouTube ในคอลัมน์ "videos", หรือเพิ่มแถวในแท็บ Media ที่ album_id ตรงกัน`,
            warn: "" });
        } catch (e) {
          const msg = e && e.message ? e.message : String(e);
          console.error("[gallery] Google Sheet load failed.", e);
          if (alive) setState({ data: [], status: "error", error: msg, warn: "" });
        }
      })();
      return () => { alive = false; };
    }, []);
    return state;
  }

  /* ---- Full-width state panel (loading / error / empty / config) ----------- */
  function StatePanel({ status, error }) {
    if (status === "ready") return null;
    const wrap = { gridColumn: "1 / -1", textAlign: "center", padding: "72px 20px" };
    if (status === "loading") {
      return html`<div style=${{ ...wrap, color: "#9a9a9a" }}>
        <div style=${{ fontSize: "16px" }}>กำลังโหลดข้อมูลจาก Google Sheet…</div>
      </div>`;
    }
    if (status === "error") {
      return html`<div style=${wrap}>
        <div style=${{ fontSize: "17px", color: "#c0392b", fontWeight: 600, marginBottom: "10px" }}>⚠️ ดึงข้อมูลจาก Google Sheet ไม่สำเร็จ</div>
        <div style=${{ fontSize: "13.5px", color: "#8a8a8a", maxWidth: "560px", margin: "0 auto", wordBreak: "break-word" }}>${error}</div>
        <div style=${{ fontSize: "13px", color: "#b0b0b0", marginTop: "14px", lineHeight: 1.6 }}>ตรวจว่า Sheet แชร์แบบ "Anyone with the link → Viewer" และชื่อแท็บเป็น Albums / Media</div>
      </div>`;
    }
    if (status === "config") {
      return html`<div style=${{ ...wrap, color: "#9a9a9a", fontSize: "16px" }}>ยังไม่ได้ตั้งค่า SHEET_ID ในไฟล์</div>`;
    }
    // empty
    return html`<div style=${{ ...wrap, color: "#9a9a9a", fontSize: "16px" }}>${error || "ไม่พบข้อมูลในชีต"}</div>`;
  }

  /* ---- Dismissible top warning bar (non-fatal, e.g. a playlist error) ------ */
  function WarnBar({ text }) {
    const [show, setShow] = useState(true);
    if (!show) return null;
    return html`<div style=${{ background: "#fff4e5", borderBottom: "1px solid #ffd8a8", color: "#8a5a00", padding: "11px clamp(20px,5vw,64px)", fontSize: "13px", display: "flex", alignItems: "center", gap: "12px", justifyContent: "center", flexWrap: "wrap", lineHeight: 1.5 }}>
      <span style=${{ maxWidth: "820px", wordBreak: "break-word" }}>⚠️ ${text}</span>
      <button onClick=${() => setShow(false)} style=${{ background: "none", border: "1px solid #e6c07a", color: "#8a5a00", borderRadius: "6px", padding: "3px 10px", cursor: "pointer", fontFamily: "inherit", fontSize: "12.5px", flex: "none" }}>ปิด</button>
    </div>`;
  }

  /* ============================================================================
   *  DERIVED HELPERS
   * ========================================================================== */
  function mediaSummary(media) {
    const nPhoto = media.filter((m) => m.type === "photo").length;
    const nVid = media.filter((m) => m.type === "video").length;
    const parts = [];
    if (nPhoto) parts.push(`${nPhoto} ภาพ`);
    if (nVid) parts.push(`${nVid} คลิป`);
    return { breakdown: parts.join(" · "), total: media.length };
  }

  // Build the filter tabs from the distinct `category` values present in the
  // data — categories are defined entirely in the sheet. Matching is
  // case-insensitive; the label shown is the exact text first seen in a cell.
  // Tabs keep first-appearance order (Albums-sheet order); "All" is always first.
  function buildTabs(works) {
    const seen = new Map(); // lowercased key -> display label
    for (const w of works) {
      const key = w.category.toLowerCase();
      if (!seen.has(key)) seen.set(key, w.category);
    }
    return [{ key: "all", label: "All" }, ...[...seen].map(([key, label]) => ({ key, label }))];
  }

  /* ============================================================================
   *  BRAND LOCKUP
   * ========================================================================== */
  function Lockup({ logoHeight, fontSize }) {
    return html`
      <div style=${{ display: "flex", alignItems: "center", gap: "13px" }}>
        <img src="assets/logo.png" alt="Bitkub" style=${{ height: logoHeight, width: "auto", display: "block" }} />
        <div style=${{ fontFamily: "'Quicksand',sans-serif", fontWeight: 700, fontSize, letterSpacing: "-0.01em", color: "#1a1a1a", whiteSpace: "nowrap" }}>
          Bitkub Media Production
        </div>
      </div>`;
  }

  // The stacked-frames "count" glyph used on cover/coverflow chips.
  function StackGlyph({ size, radius, bg }) {
    return html`
      <div style=${{ position: "relative", width: size, height: size }}>
        <div style=${{ position: "absolute", inset: `0 2px 2px 0`, border: "1.5px solid #fff", borderRadius: radius }}></div>
        <div style=${{ position: "absolute", inset: `2px 0 0 2px`, border: "1.5px solid #fff", borderRadius: radius, background: bg }}></div>
      </div>`;
  }

  /* ============================================================================
   *  APP
   * ========================================================================== */
  function App() {
    const { data, status, error, warn } = useGalleryData();
    const [active, setActive] = useState("all");
    const [center, setCenter] = useState(0);
    const [openAlbumId, setOpenAlbumId] = useState(null);
    const [mediaIndex, setMediaIndex] = useState(null);
    const [solo, setSolo] = useState(false); // opened straight into the lightbox (single-media work)
    const touchX = useRef(0);

    const tabs = buildTabs(data);
    const matches = (d) => active === "all" || d.category.toLowerCase() === active;
    const filtered = data.filter(matches);
    const len = filtered.length;

    // Clamp center whenever the filtered list shrinks.
    let curCenter = center;
    if (curCenter > len - 1) curCenter = Math.max(0, len - 1);
    if (curCenter < 0) curCenter = 0;

    const album = data.find((d) => d.id === openAlbumId) || null;

    const selectTab = (key) => { setActive(key); setCenter(0); };
    const step = (dir) => setCenter((c) => {
      const l = data.filter(matches).length;
      return Math.min(l - 1, Math.max(0, c + dir));
    });
    // Single-media works (e.g. a lone video) open straight into the lightbox;
    // multi-media works open the album grid first.
    const openAlbum = (id) => {
      const al = data.find((d) => d.id === id);
      const isSolo = !!al && al.media.length === 1;
      document.body.style.overflow = "hidden";
      setOpenAlbumId(id);
      setSolo(isSolo);
      setMediaIndex(isSolo ? 0 : null);
    };
    const closeAlbum = () => { document.body.style.overflow = ""; setOpenAlbumId(null); setMediaIndex(null); setSolo(false); };
    const openMedia = (i) => setMediaIndex(i);
    const closeMedia = () => { if (solo) closeAlbum(); else setMediaIndex(null); };
    const stepMedia = (dir) => {
      if (!album) return;
      const l = album.media.length;
      setMediaIndex((i) => (i + dir + l) % l);
    };

    // Keyboard: Esc closes (media first, then album); arrows navigate lightbox.
    useEffect(() => {
      const onKey = (e) => {
        if (e.key === "Escape") {
          if (mediaIndex != null) closeMedia();
          else if (openAlbumId) closeAlbum();
          return;
        }
        if (mediaIndex == null) return;
        if (e.key === "ArrowRight") stepMedia(1);
        if (e.key === "ArrowLeft") stepMedia(-1);
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [mediaIndex, openAlbumId, album, solo]);

    useEffect(() => () => { document.body.style.overflow = ""; }, []);

    const swipeStart = (e) => { touchX.current = e.touches[0].clientX; };
    const swipeEnd = (e) => {
      const dx = e.changedTouches[0].clientX - touchX.current;
      if (Math.abs(dx) > 44) step(dx < 0 ? 1 : -1);
    };

    const ac = filtered[curCenter];
    const activeTitle = ac ? ac.title : "";
    const activeMeta = ac ? `${ac.category} · ${ac.client} · ${ac.media.length} รายการ` : "";
    const showStage = len > 0;

    return html`
      <div style=${{ background: "#f4f4f4", minHeight: "100vh", color: "#262626", fontFamily: "'Quicksand','Mitr',sans-serif", WebkitFontSmoothing: "antialiased", overflowX: "hidden" }}>

        ${/* ---- NON-FATAL WARNING (e.g. a playlist that failed to load) ---- */""}
        ${warn && html`<${WarnBar} text=${warn} />`}

        ${/* ---- HERO ---- */""}
        <header style=${{ textAlign: "center", padding: "clamp(40px,7vh,84px) clamp(20px,5vw,64px) clamp(14px,2vh,26px)", display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div style=${{ marginBottom: "26px" }}><${Lockup} logoHeight="38px" fontSize="clamp(20px,2.6vw,28px)" /></div>
          <h1 style=${{ fontFamily: "'Quicksand',sans-serif", fontWeight: 600, fontSize: "clamp(38px,6vw,76px)", lineHeight: 1.02, margin: 0, letterSpacing: "-0.02em", color: "#1a1a1a" }}>Production Gallery</h1>

          <div style=${{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: "9px", margin: "34px auto 0", maxWidth: "780px" }}>
            ${tabs.map(({ key, label }) => {
              const on = key === active;
              return html`<button key=${key} onClick=${() => selectTab(key)}
                style=${{ flex: "none", cursor: "pointer", fontFamily: "'Quicksand','Mitr',sans-serif", fontSize: "13.5px", padding: "9px 18px", borderRadius: "999px",
                  fontWeight: on ? 600 : 500, border: on ? `1px solid ${GREEN}` : "1px solid #e2e2e2", background: on ? GREEN : "#ffffff", color: on ? "#063d22" : "#6a6a6a",
                  transition: "background 0.25s, color 0.25s, border-color 0.25s" }}>${label}</button>`;
            })}
          </div>
        </header>

        ${/* ---- COVERFLOW ---- */""}
        ${showStage && html`
          <${Fragment}>
            <section onTouchStart=${swipeStart} onTouchEnd=${swipeEnd}
              style=${{ position: "relative", height: "clamp(220px,32vw,400px)", margin: "clamp(28px,4vh,52px) 0 clamp(8px,2vh,18px)", overflow: "hidden", touchAction: "pan-y" }}>
              ${filtered.map((d, i) => {
                const off = i - curCenter;
                const abs = Math.abs(off);
                const isCenter = off === 0;
                return html`
                  <div key=${d.id} role="button" tabindex="0"
                    onClick=${() => (isCenter ? openAlbum(d.id) : setCenter(i))}
                    onKeyDown=${(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); isCenter ? openAlbum(d.id) : setCenter(i); } }}
                    style=${{ position: "absolute", top: "50%", left: "50%", width: "clamp(280px, 44vw, 580px)", aspectRatio: "16 / 9",
                      borderRadius: "16px", overflow: "hidden", backgroundColor: "#eaeaea",
                      transform: `translate(-50%, -50%) translateX(${off * 54}%) scale(${Math.max(0.62, 1 - abs * 0.15)})`,
                      zIndex: String(30 - abs), opacity: abs > 2 ? 0 : 1,
                      boxShadow: isCenter ? "0 34px 70px -18px rgba(0,0,0,0.14), 0 14px 34px -12px rgba(0,0,0,0.08)" : "0 22px 50px -20px rgba(0,0,0,0.10)",
                      border: "1px solid rgba(0,0,0,0.06)", transition: "transform 0.6s cubic-bezier(0.2,0.8,0.2,1), opacity 0.5s, box-shadow 0.5s",
                      cursor: "pointer", pointerEvents: abs > 2 ? "none" : "auto", outline: "none" }}>
                    <img src=${d.cover} alt="" loading="lazy" onError=${coverStepDown} onLoad=${coverOnLoad} style=${{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                    <div style=${{ position: "absolute", inset: 0, pointerEvents: "none", transition: "background 0.5s",
                      background: isCenter ? "transparent" : `rgba(247,247,247,${Math.min(0.66, 0.4 + (abs - 1) * 0.24)})` }}></div>
                    <div style=${{ position: "absolute", right: "16px", bottom: "16px", display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", fontWeight: 600, color: "#fff", background: "rgba(26,26,26,0.58)", backdropFilter: "blur(4px)", padding: "6px 12px", borderRadius: "999px" }}>
                      <${StackGlyph} size="12px" radius="2.5px" bg="rgba(26,26,26,0.58)" />

              })}
            </section>

            <div style=${{ textAlign: "center", margin: "clamp(12px,2vh,20px) auto clamp(4px,1vh,8px)", minHeight: "46px", padding: "0 20px" }}>
              <div style=${{ fontWeight: 500, fontSize: "clamp(17px,2vw,21px)", color: "#1f1f1f" }}>${activeTitle}</div>
              <div style=${{ fontSize: "12.5px", color: "#00BF61", fontWeight: 600, letterSpacing: "0.03em", marginTop: "3px" }}>${activeMeta}</div>
            </div>

            <div style=${{ display: "flex", justifyContent: "center", gap: "14px", marginBottom: "clamp(18px,3vh,36px)" }}>
              ${["←", "→"].map((arrow, k) => html`
                <${ArrowBtn} key=${arrow} label=${arrow} onClick=${() => step(k === 0 ? -1 : 1)} />`)}
            </div>
          <//>`}

        ${/* ---- STICKY FILTER ---- */""}
        <nav style=${{ position: "sticky", top: 0, zIndex: 30, background: "rgba(244,244,244,0.85)", backdropFilter: "blur(14px)", borderTop: "1px solid #e6e6e6", borderBottom: "1px solid #e6e6e6", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "24px", padding: "15px clamp(20px,5vw,64px)" }}>
          <div style=${{ display: "flex", alignItems: "baseline", gap: "12px", flex: "none" }}>

            <span style=${{ fontFamily: "'Quicksand',sans-serif", fontWeight: 700, fontSize: "16px", color: "#007339" }}>${len}</span>
          </div>
          <div class="mer-noscroll" style=${{ display: "flex", gap: "4px", overflowX: "auto", flex: 1, justifyContent: "flex-end", scrollbarWidth: "none" }}>
            ${tabs.map(({ key, label }) => {
              const on = key === active;
              return html`<button key=${key} onClick=${() => selectTab(key)}
                style=${{ flex: "none", background: "none", border: "none", cursor: "pointer", fontFamily: "'Quicksand','Mitr',sans-serif", fontWeight: 500, fontSize: "13.5px", padding: "8px 14px", color: on ? "#1a1a1a" : "#9a9a9a", borderRadius: "6px" }}>
                ${label}
                ${on && html`<div style=${{ height: "2px", background: GREEN, marginTop: "6px", borderRadius: "2px" }}></div>`}
              </button>`;
            })}
          </div>
        </nav>

        ${/* ---- ALBUM GRID ---- */""}
        <main style=${{ padding: "clamp(28px,4vw,56px) clamp(20px,5vw,64px) clamp(60px,10vh,120px)", display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(clamp(260px,30vw,340px),1fr))", gap: "clamp(18px,2vw,30px)" }}>
          ${filtered.map((d) => html`<${GridCard} key=${d.id} album=${d} onOpen=${() => openAlbum(d.id)} />`)}
          ${status !== "ready" && html`<${StatePanel} status=${status} error=${error} />`}
          ${status === "ready" && len === 0 && html`<div style=${{ gridColumn: "1 / -1", textAlign: "center", padding: "64px 0", color: "#9a9a9a", fontSize: "16px" }}>ยังไม่มีอัลบั้มในหมวดนี้</div>`}
        </main>

        ${/* ---- FOOTER ---- */""}
        <footer style=${{ borderTop: "1px solid #e6e6e6", background: "#fff", padding: "clamp(40px,7vh,80px) clamp(20px,5vw,64px)", display: "flex", flexWrap: "wrap", gap: "32px", justifyContent: "space-between", alignItems: "flex-end" }}>
          <${Lockup} logoHeight="30px" fontSize="clamp(19px,2.4vw,24px)" />
        </footer>

        ${/* ---- ALBUM DETAIL OVERLAY (hidden for single-media "solo" works) ---- */""}
        ${album && !solo && html`<${AlbumModal} album=${album} onClose=${closeAlbum} onOpenMedia=${openMedia} onStop=${(e) => e.stopPropagation()} />`}

        ${/* ---- SINGLE MEDIA LIGHTBOX ---- */""}
        ${album && mediaIndex != null && html`<${MediaLightbox} album=${album} index=${mediaIndex} single=${album.media.length <= 1} onClose=${closeMedia} onPrev=${() => stepMedia(-1)} onNext=${() => stepMedia(1)} onStop=${(e) => e.stopPropagation()} />`}
      </div>`;
  }

  function AlbumModal({ album, onClose, onOpenMedia, onStop }) {

  function LightboxBtn({ label, style, onClick }) {
    const [hover, setHover] = useState(false);
    return html`<button onClick=${onClick} onMouseEnter=${() => setHover(true)} onMouseLeave=${() => setHover(false)}

  function MediaLightbox({ album, index, single, onClose, onPrev, onNext, onStop }) {
    const m = album.media[index];
    const isVideo = m.type === "video";
    const title = m.label || `${album.title} · ${index + 1}`;
    // Pass the real page origin to the embed (helps YouTube validate the
    // embedding site and avoids some referrer-related player errors). Only add
    // it on http/https — on file:// the origin is "null" and would hurt.
    const originParam = /^https?:$/.test(location.protocol) ? `&origin=${encodeURIComponent(location.origin)}` : "";
    const embedSrc = `https://www.youtube.com/embed/${m.yt}?rel=0&modestbranding=1&playsinline=1&autoplay=1${originParam}`;
    const watchUrl = `https://www.youtube.com/watch?v=${m.yt}`;
    return html`
      <div onClick=${onClose} style=${{ position: "fixed", inset: 0, zIndex: 120, background: "rgba(15,15,15,0.86)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", padding: "clamp(12px,4vw,64px)", animation: "merFade 0.25s ease" }}>

        <${LightboxBtn} label="✕" onClick=${onClose} style=${{ position: "absolute", top: "20px", right: "20px", zIndex: 5, width: "42px", height: "42px", borderRadius: "50%", fontSize: "18px", lineHeight: 1 }} />
        ${!single && html`<${LightboxBtn} label="←" onClick=${onPrev} style=${{ position: "absolute", left: "clamp(8px,2vw,28px)", top: "50%", transform: "translateY(-50%)", zIndex: 5, width: "50px", height: "50px", borderRadius: "50%", fontSize: "20px" }} />`}
        ${!single && html`<${LightboxBtn} label="→" onClick=${onNext} style=${{ position: "absolute", right: "clamp(8px,2vw,28px)", top: "50%", transform: "translateY(-50%)", zIndex: 5, width: "50px", height: "50px", borderRadius: "50%", fontSize: "20px" }} />`}

        <div onClick=${onStop} style=${{ width: "100%", maxWidth: "1100px", display: "flex", flexDirection: "column", alignItems: "center", gap: "18px", animation: "merPop 0.3s cubic-bezier(0.2,0.8,0.2,1) both" }}>
          ${isVideo
            ? html`<div style=${{ width: "100%", aspectRatio: "16 / 9", borderRadius: "14px", overflow: "hidden", background: "#000", boxShadow: "0 30px 80px rgba(0,0,0,0.5)" }}>
                <iframe src=${embedSrc} style=${{ width: "100%", height: "100%", border: 0, display: "block" }} referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen=${true}></iframe>
              </div>`
            : html`<div style=${{ width: "100%", maxWidth: "1100px", aspectRatio: "16 / 9", borderRadius: "14px", backgroundImage: `url("${m.full || m.src}")`, backgroundSize: "contain", backgroundPosition: "center", backgroundRepeat: "no-repeat", boxShadow: "0 30px 80px rgba(0,0,0,0.5)" }}></div>`}
          <div style=${{ display: "flex", alignItems: "center", gap: "16px", color: "#fff", flexWrap: "wrap", justifyContent: "center" }}>
            <span style=${{ fontWeight: 500, fontSize: "15px" }}>${title}</span>
            <span style=${{ width: "4px", height: "4px", borderRadius: "50%", background: "rgba(255,255,255,0.4)" }}></span>
            <span style=${{ fontFamily: "'Quicksand',sans-serif", fontWeight: 600, fontSize: "13px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.04em" }}>${index + 1} / ${album.media.length}</span>
            ${isVideo && html`<a href=${watchUrl} target="_blank" rel="noopener noreferrer" style=${{ fontFamily: "'Quicksand',sans-serif", fontWeight: 600, fontSize: "13px", color: "#02D767", textDecoration: "none", borderBottom: "1px solid rgba(2,215,103,0.5)", paddingBottom: "1px" }}>เปิดใน YouTube ↗</a>`}
          </div>
        </div>
      </div>`;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
})();
</script>
</body>
</html>
